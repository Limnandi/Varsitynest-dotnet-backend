name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 6.0.x
    - name: Restore dependencies
      run: dotnet restore src/MyBackendApp/MyBackendApp.csproj
    - name: Build
      run: dotnet build src/MyBackendApp/MyBackendApp.csproj --no-restore
    - name: Test
      run: dotnet test tests/MyBackendApp.Tests/MyBackendApp.Tests.csproj --no-build --verbosity normal